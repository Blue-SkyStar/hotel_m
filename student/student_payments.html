<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        if (localStorage.getItem("role") !== "student") { window.location.href = "../login.html"; }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fees & Payments</title>
    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/animate.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="../js/sweetalert.js"></script>
    <script src="../js/storage.js"></script>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-md navbar-dark bg-dark shadow-lg fixed-top">
        <div class="container-fluid">
            <img src="../img/logo.jpg" class="rounded-circle" width="45">
            <a class="navbar-brand mx-3 fw-bold">Student Portal</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu"><span
                    class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="profileDropdown"
                            role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fa fa-user-circle fs-4 me-2 text-white-50"></i>
                            <span id="welcomeUser" class="text-white">Student</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2 animate__animated animate__fadeIn"
                            aria-labelledby="profileDropdown" style="border-radius: 12px;">
                            <li><a class="dropdown-item py-2" href="student_profile.html"><i
                                        class="fa fa-user me-2 text-primary"></i> My Profile</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item py-2 text-danger" href="#" onclick="logout()"><i
                                        class="fa fa-sign-out-alt me-2"></i> Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid" style="margin-top:80px">
        <div class="row">
            <div class="col-md-2 bg-dark text-white p-3" style="min-height:100vh">
                <h5 class="text-center mt-2 mb-3">MENU</h5>
                <hr>
                <ul class="nav flex-column">
                    <li class="nav-item mb-3"><a href="student_dashboard.html" class="nav-link text-white"><i
                                class="fa fa-home me-2"></i> Dashboard</a></li>
                    <li class="nav-item mb-3"><a href="student_profile.html" class="nav-link text-white"><i
                                class="fa fa-user me-2"></i> Profile</a></li>
                    <li class="nav-item mb-3"><a href="student_room.html" class="nav-link text-white"><i
                                class="fa fa-bed me-2"></i> My Room</a></li>
                    <li class="nav-item mb-3"><a href="student_room_details.html" class="nav-link text-white"><i
                                class="fa fa-building me-2"></i> Room Details</a></li>
                    <li class="nav-item mb-3"><a href="student_application_status.html" class="nav-link text-white"><i
                                class="fa fa-file-signature me-2"></i> My Applications</a></li>
                    <li class="nav-item mb-3"><a href="student_payments.html" class="nav-link text-white active"
                            style="background:rgba(255,255,255,0.1); border-radius:8px;"><i
                                class="fa fa-credit-card me-2"></i> Fees / Payments</a></li>
                    <li class="nav-item mb-3"><a href="student_complaints.html" class="nav-link text-white"><i
                                class="fa fa-exclamation-circle me-2"></i> Complaints</a></li>
                    <li class="nav-item mb-3"><a href="student_notices.html" class="nav-link text-white"><i
                                class="fa fa-bullhorn me-2"></i> Notices</a></li>
                </ul>
            </div>

            <div class="col-md-10 p-4">
                <h2 class="mb-4"><i class="fa fa-credit-card me-2 text-success"></i>Fees & Payments</h2>

                <!-- Summary Cards -->
                <div class="row g-4 mb-4">
                    <div class="col-md-4">
                        <div class="card border-0 shadow text-center p-4" style="border-radius:16px;">
                            <i class="fa fa-indian-rupee-sign fs-1 text-success mb-2"></i>
                            <h3 class="fw-bold" id="totalPaid">₹0</h3>
                            <p class="text-muted mb-0">Total Paid</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card border-0 shadow text-center p-4" style="border-radius:16px;">
                            <i class="fa fa-clock fs-1 text-warning mb-2"></i>
                            <h3 class="fw-bold" id="pendingAmount">₹0</h3>
                            <p class="text-muted mb-0">Pending</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card border-0 shadow text-center p-4" style="border-radius:16px;">
                            <i class="fa fa-receipt fs-1 text-primary mb-2"></i>
                            <h3 class="fw-bold" id="totalTxns">0</h3>
                            <p class="text-muted mb-0">Transactions</p>
                        </div>
                    </div>
                </div>

                <!-- Payment History -->
                <div class="card shadow border-0" style="border-radius:16px; overflow:hidden;">
                    <div class="card-header bg-dark text-white py-3 px-4">
                        <h5 class="mb-0 fw-bold"><i class="fa fa-history me-2"></i> Payment History</h5>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0" id="payTable">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4 py-3">ID</th>
                                    <th class="py-3">Date</th>
                                    <th class="py-3">Amount</th>
                                    <th class="py-3">Method</th>
                                    <th class="py-3">Status</th>
                                </tr>
                            </thead>
                            <tbody id="payBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = async function () {
            await initData();
            let username = localStorage.getItem("loggedUser") || "";
            let myPayments = payments.filter(p => p.student && p.student.toLowerCase() === username.toLowerCase());

            let totalPaid = myPayments.reduce((s, p) => s + Number(p.amount), 0);
            document.getElementById("totalPaid").textContent = "₹" + totalPaid;
            document.getElementById("totalTxns").textContent = myPayments.length;

            let tbody = document.getElementById("payBody");
            tbody.innerHTML = "";
            if (myPayments.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">No payment records found.</td></tr>';
            } else {
                myPayments.forEach(p => {
                    let statusBadge = p.status === "Paid"
                        ? '<span class="badge bg-success bg-opacity-10 text-success border border-success">Paid</span>'
                        : '<span class="badge bg-warning bg-opacity-10 text-warning border border-warning">Pending</span>';
                    tbody.innerHTML += `<tr>
                        <td class="ps-4">${p.id}</td>
                        <td>${p.date || '—'}</td>
                        <td class="fw-bold">₹${p.amount}</td>
                        <td>${p.method || 'Cash'}</td>
                        <td>${statusBadge}</td>
                    </tr>`;
                });
            }
        }

    </script>
    <script src="../js/bootstrap.js"></script>
</body>

</html>
