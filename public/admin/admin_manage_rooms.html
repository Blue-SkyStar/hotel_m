<!DOCTYPE html>
<html lang="en">

<head>
<!-- Authentication -->
    <script src="../js/auth_service.js"></script>
    <script>AuthService.init('admin');</script>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooms Management</title>
    <link rel="icon" href="../img/logo/logo.png">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="../css/animate.css">
    <link rel="stylesheet" href="../css/index.css"> <!-- Reusing our nice global dashboard styles -->
    <link rel="stylesheet" href="../css/students.css"> <!-- Reusing table/button styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- JS -->
    <script src="../js/sweetalert.js"></script>
    <script src="../js/storage.js"></script>
</head>

<body>
    <div id="navbar-mount"></div>

    <!-- Navbar -->
    


    <div class="container-fluid" style="margin-top:70px">
        <div class="row">

            <!-- Sidebar -->
            
            <div id="sidebar-mount" class="col-md-2 p-0"></div>



            <!-- Main Content -->
            <div class="col-md-10 p-4">
                <!-- Page header -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="mb-0">Room Management</h2>
                    <button class="btn btn-primary px-4 py-2" data-bs-toggle="modal" data-bs-target="#addRoomModal"
                        style="background:linear-gradient(135deg,#00d2ff,#3a7bd5);border:none;" id="addRoomBtn">
                        <i class="fa fa-plus me-2"></i> Add Room
                    </button>
                </div>

                <!-- ── Tab Navigation ───────────────────────────────── -->
                <ul class="nav nav-tabs mb-0" id="roomsTabs" role="tablist" style="border-bottom:none">
                    <li class="nav-item">
                        <button class="nav-link active fw-semibold" id="tab-rooms" data-bs-toggle="tab"
                            data-bs-target="#pane-rooms" type="button"
                            onclick="document.getElementById('addRoomBtn').style.display='inline-flex'">
                            <i class="fa fa-bed me-2"></i>Rooms
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link fw-semibold" id="tab-alloc" data-bs-toggle="tab"
                            data-bs-target="#pane-alloc" type="button"
                            onclick="document.getElementById('addRoomBtn').style.display='none'; loadAllocations()">
                            <i class="fa fa-key me-2"></i>Room Allocation
                        </button>
                    </li>
                </ul>

                <div class="tab-content">

                <!-- ── Tab 1: Rooms ──────────────────────────────────── -->
                <div class="tab-pane fade show active" id="pane-rooms">
                    <!-- Search bar -->
                    <div class="row mb-3 mt-3">
                        <div class="col-md-5">
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0"><i class="fa fa-search text-muted"></i></span>
                                <input type="text" id="searchRooms" onkeyup="searchTable('searchRooms','roomsTable')"
                                    class="form-control border-start-0 ps-0" placeholder="Search Rooms..." style="box-shadow:none">
                            </div>
                        </div>
                    </div>

                    <div class="card shadow animate__animated animate__fadeInUp border-0" style="border-radius:0 16px 16px 16px;overflow:hidden">
                        <div class="card-header bg-dark text-white py-3 px-4">
                            <h5 class="mb-0 fw-bold"><i class="fa fa-door-open me-2"></i> Room List</h5>
                        </div>
                        <div class="card-body p-0">
                            <table class="table table-hover mb-0" id="roomsTable">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4 py-3">Room ID</th>
                                        <th class="py-3">Room Number</th>
                                        <th class="py-3">Room Type</th>
                                        <th class="py-3">Capacity</th>
                                        <th class="py-3">Occupied</th>
                                        <th class="py-3">Status</th>
                                        <th class="py-3">Next Vacancy</th>
                                        <th class="pe-4 py-3 text-center">Action</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div><!-- /tab-pane rooms -->

                <!-- ── Tab 2: Room Allocation ────────────────────────── -->
                <div class="tab-pane fade" id="pane-alloc">
                    <div class="card shadow border-0 mt-3" style="border-radius:0 16px 16px 16px;">
                        <div class="card-header bg-white border-bottom py-3 px-4">
                            <ul class="nav nav-pills gap-2" id="allocSubTabs">
                                <li class="nav-item"><button class="nav-link active px-3" onclick="filterAlloc('Pending Review',this)">Pending Review</button></li>
                                <li class="nav-item"><button class="nav-link px-3" onclick="filterAlloc('Approved - Awaiting Payment',this)">Awaiting Payment</button></li>
                                <li class="nav-item"><button class="nav-link px-3" onclick="filterAlloc('Allocated',this)">Allocated</button></li>
                                <li class="nav-item"><button class="nav-link px-3" onclick="filterAlloc('Rejected',this)">Rejected</button></li>
                            </ul>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0" id="allocTable">
                                    <thead class="table-light">
                                        <tr>
                                            <th class="ps-4 py-3">App ID</th>
                                            <th class="py-3">Date</th>
                                            <th class="py-3">Student</th>
                                            <th class="py-3">Room</th>
                                            <th class="py-3">Status</th>
                                            <th class="pe-4 py-3 text-center">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="allocBody">
                                        <tr><td colspan="6" class="text-center text-muted py-4">Click "Room Allocation" tab to load.</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div><!-- /tab-pane alloc -->

                </div><!-- /tab-content -->

            </div>
        </div>
    </div>
    <!-- Add Room Modal -->
    <div class="modal fade" id="addRoomModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 16px;">
                <div class="modal-header bg-dark text-white" style="border-radius: 16px 16px 0 0; padding: 1.5rem;">
                    <h5 class="modal-title fw-bold"><i class="fa fa-plus-circle me-2"></i> Add Room</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="roomForm">
                        <div class="mb-4">
                            <label class="form-label text-muted fw-bold small text-uppercase">Room Number</label>
                            <input type="text" class="form-control form-control-lg bg-light border-0" id="roomNumber" placeholder="Enter Room Number" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted fw-bold small text-uppercase">Room Type</label>
                            <select class="form-select form-select-lg bg-light border-0" id="roomType">
                                <option>Single</option>
                                <option>Double</option>
                                <option>Triple</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted fw-bold small text-uppercase">Capacity</label>
                            <input type="number" class="form-control form-control-lg bg-light border-0" id="capacity" placeholder="Enter Capacity" required>
                        </div>
                        <div class="text-end">
                            <button type="button" class="btn btn-light px-4 py-2 me-2" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary px-4 py-2" style="background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); border: none;">
                                <i class="fa fa-save me-2"></i> Save Room
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        
        function loadRooms() {
            let table = document.querySelector("#roomsTable tbody");
            table.innerHTML = "";
            
            if(rooms.length === 0) {
                table.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">No rooms added.</td></tr>';
                return;
            }

            rooms.forEach((room, index) => {
                let statusBadge = '<span class="badge bg-success bg-opacity-10 text-success border border-success">Available</span>';
                if(room.status === "Full") statusBadge = '<span class="badge bg-danger bg-opacity-10 text-danger border border-danger">Full</span>';
                if(room.status === "Almost Full") statusBadge = '<span class="badge bg-warning bg-opacity-10 text-warning border border-warning">Almost Full</span>';

                // ── Calculate Next Vacancy ────────────────────────────
                const roomApps = (typeof applications !== 'undefined' ? applications : []).filter(a => a.roomNumber === room.number && a.status === 'Allocated');
                let vacancyText = '<span class="text-success small">Now</span>';
                
                if (roomApps.length >= room.capacity) {
                    const endDates = roomApps.map(a => new Date(a.endDate)).filter(d => !isNaN(d));
                    if (endDates.length > 0) {
                        const earliestEnd = new Date(Math.min(...endDates));
                        vacancyText = '<span class="text-danger fw-bold small">' + earliestEnd.toLocaleDateString('en-IN', {day: 'numeric', month: 'short'}) + '</span>';
                    } else {
                        vacancyText = '<span class="text-muted small">N/A</span>';
                    }
                }

                let row = `
                <tr>
                    <td class="ps-4">${index + 1}</td>
                    <td class="fw-medium text-dark">${room.number}</td>
                    <td><span class="badge bg-secondary">${room.type}</span></td>
                    <td>${room.capacity}</td>
                    <td>${room.occupied || 0}</td>
                    <td>${statusBadge}</td>
                    <td>${vacancyText}</td>
                    <td class="pe-4 text-center">
                        <button class="btn btn-sm btn-outline-primary me-1"><i class="fa fa-edit"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteRoom(${room.id})"><i class="fa fa-trash"></i></button>
                    </td>
                </tr>
                `;
                table.innerHTML += row;
            });
        }
            })
        }

        document.getElementById("roomForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            let roomNumber = document.getElementById("roomNumber").value;
            let roomType = document.getElementById("roomType").value;
            let capacity = document.getElementById("capacity").value;

            await addRoom(roomNumber, roomType, capacity);

            // Close the modal
            let modalElement = document.getElementById('addRoomModal');
            let modalObj = bootstrap.Modal.getInstance(modalElement);
            if(modalObj) modalObj.hide();

            // Reset form
            document.getElementById("roomForm").reset();

            Swal.fire({
                icon: 'success',
                title: 'Room Added!',
                text: 'The new room has been successfully added to the database.',
                confirmButtonColor: '#3a7bd5'
            });

            loadRooms();
        });

        window.onload = async function() {
            await initData();
            loadRooms();
        }

        // ── Room Allocation Tab ───────────────────────────────────────
        let allAllocations = [];
        let allocFilter = 'Pending Review';
        let allocLoaded = false;

        async function loadAllocations() {
            if (allocLoaded) return;
            const tbody = document.getElementById('allocBody');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4"><div class="spinner-border text-primary" role="status"></div></td></tr>';
            try {
                const res = await fetch(`${API_URL}/data/applications`);
                allAllocations = res.ok ? await res.json() : [];
                allocLoaded = true;
                renderAllocTable();
            } catch(e) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">Could not load applications.</td></tr>';
            }
        }

        function filterAlloc(status, btn) {
            allocFilter = status;
            document.querySelectorAll('#allocSubTabs .nav-link').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderAllocTable();
        }

        function renderAllocTable() {
            const tbody = document.getElementById('allocBody');
            const filtered = allAllocations.filter(a => a.status === allocFilter);
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-5">No applications in this category.</td></tr>';
                return;
            }
            const statusColors = {
                'Pending Review': 'bg-warning bg-opacity-10 text-warning border border-warning',
                'Approved - Awaiting Payment': 'bg-primary bg-opacity-10 text-primary border border-primary',
                'Allocated': 'bg-success bg-opacity-10 text-success border border-success',
                'Rejected': 'bg-danger bg-opacity-10 text-danger border border-danger',
                'Waitlisted': 'bg-secondary bg-opacity-10 text-secondary border border-secondary'
            };
            tbody.innerHTML = filtered.sort((a,b)=>b.id-a.id).map(app => `
            <tr>
                <td class="ps-4 text-muted fw-bold">#${app.id || ''}</td>
                <td>${app.date || '—'}</td>
                <td>
                    <div class="fw-medium">${app.studentName || app.student || '—'}</div>
                    <div class="small text-muted">${app.phone || ''}</div>
                </td>
                <td>
                    <div class="fw-medium">${app.roomNumber || '—'}</div>
                    <div class="small text-muted">${app.roomType || ''}</div>
                </td>
                <td><span class="badge ${statusColors[app.status] || 'bg-secondary'} small">${app.status}</span></td>
                <td class="pe-4 text-center">
                    <a href="admin_room_allocation.html" class="btn btn-sm btn-outline-primary rounded-pill px-3">
                        <i class="fa fa-external-link-alt me-1"></i>Review
                    </a>
                </td>
            </tr>`).join('');
        }
    </script>
    <script src="../js/bootstrap.bundle.js"></script>

    <!-- Shared Admin Layout -->
    <script src="../js/admin_layout.js"></script>
    <script>initAdminLayout('rooms');</script>
</body>
</html>
