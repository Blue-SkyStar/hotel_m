<!DOCTYPE html>
<html lang="en">

<head>
<script>
if(localStorage.getItem("role") !== "admin"){
    window.location.href = "../login.html";
}
</script>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students</title>
    <link rel="icon" href="../img/logo/logo.png">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="../css/animate.css">
    <link rel="stylesheet" href="../css/index.css"> <!-- Reusing our nice global dashboard styles -->
    <link rel="stylesheet" href="../css/students.css"> <!-- Page specific styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- JS -->
    <script src="../js/sweetalert.js"></script>
    <script src="../js/storage.js"></script>
</head>

<body>
    <div id="navbar-mount"></div>

    <!-- Navbar -->
    


    <div class="container-fluid" style="margin-top:70px">
        <div class="row">

            <!-- Sidebar -->
            
            <div id="sidebar-mount" class="col-md-2 p-0"></div>



            <!-- Main Content -->
            <div class="col-md-10 p-4">
                <h2 class="mb-4">Students Management</h2>

                <!-- Search + Add Button -->
                <div class="row mb-4 align-items-center">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="fa fa-search text-muted"></i></span>
                            <input type="text" id="searchStudents" onkeyup="searchTable('searchStudents', 'studentsTable')" class="form-control border-start-0 ps-0" placeholder="Search Student..." style="box-shadow: none;">
                        </div>
                    </div>
                    <div class="col-md-6 text-end">
                        <a href="admin_add_student.html" class="btn btn-primary px-4 py-2" style="background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); border: none;">
                            <i class="fa fa-plus me-2"></i> Add Student
                        </a>
                    </div>
                </div>

                <!-- Students Table -->
                <div class="card shadow animate__animated animate__fadeInUp border-0" style="border-radius: 16px; overflow: hidden;">
                    <div class="card-header bg-dark text-white py-3 px-4">
                        <h5 class="mb-0 fw-bold"><i class="fa fa-users me-2"></i> Student List</h5>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0" id="studentsTable">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4 py-3">ID</th>
                                    <th class="py-3">Name</th>
                                    <th class="py-3">Email</th>
                                    <th class="py-3">Phone</th>
                                    <th class="py-3">Course</th>
                                    <th class="py-3">Room</th>
                                    <th class="py-3">Status</th>
                                    <th class="pe-4 py-3 text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data will be loaded dynamically via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function loadStudents() {
            let table = document.querySelector("#studentsTable tbody");
            table.innerHTML = "";

            if(students.length === 0) {
                table.innerHTML = `<tr><td colspan="8" class="text-center text-muted py-4">No students found.</td></tr>`;
                return;
            }

            students.forEach(student => {
                let row = `
                <tr>
                    <td class="ps-4">${student.id}</td>
                    <td class="fw-medium text-dark">${student.name}</td>
                    <td>${student.email}</td>
                    <td>${student.phone}</td>
                    <td><span class="badge bg-secondary">${student.course}</span></td>
                    <td>${student.room}</td>
                    <td><span class="badge bg-success bg-opacity-10 text-success border border-success">${student.status || 'Active'}</span></td>
                    <td class="pe-4 text-center">
                        <button class="btn btn-sm btn-outline-primary me-1"><i class="fa fa-edit"></i></button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteStudent(${student.id})"><i class="fa fa-trash"></i></button>
                    </td>
                </tr>
                `;
                table.innerHTML += row;
            });
        }

        // Setup optional delete functionality for complete crud (bonus)
        async function deleteStudent(id) {
            Swal.fire({
                title: 'Are you sure?',
                text: "You won't be able to revert this!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Yes, delete it!'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const success = await deleteData('students', id);
                    if (success) {
                        loadStudents();
                        Swal.fire('Deleted!', 'User has been deleted.', 'success');
                    } else {
                        Swal.fire('Error', 'Could not delete student.', 'error');
                    }
                }
            })
        }

        window.onload = async function() {
            await initData();
            loadStudents();
        }
    </script>
    <script src="../js/bootstrap.bundle.js"></script>

    <!-- Shared Admin Layout -->
    <script src="../js/admin_layout.js"></script>
    <script>initAdminLayout('students');</script>
</body>
</html>
