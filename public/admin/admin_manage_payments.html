<!DOCTYPE html>
<html lang="en">

<head>
<!-- Authentication -->
    <script src="../js/auth_service.js"></script>
    <script>AuthService.init('admin');</script>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments Management</title>
    <link rel="icon" href="../img/logo/logo.png">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="../css/animate.css">
    <link rel="stylesheet" href="../css/index.css"> <!-- Reusing global dashboard styles -->
    <link rel="stylesheet" href="../css/students.css"> <!-- Reusing form and table styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- JS -->
    <script src="../js/sweetalert.js"></script>
    <script src="../js/storage.js"></script>
</head>

<body>
    <div id="navbar-mount"></div>

    <!-- Navbar -->
    


    <div class="container-fluid" style="margin-top:70px">
        <div class="row">

            <!-- Sidebar -->
            
            <div id="sidebar-mount" class="col-md-2 p-0"></div>



            <!-- Main Content -->
            <div class="col-md-10 p-4">
                <h2 class="mb-4">Fee Payments</h2>

                <!-- Payment Form -->
                <div class="card shadow animate__animated animate__fadeInUp border-0 mb-5" style="border-radius: 16px;">
                    <div class="card-header bg-dark text-white py-3 px-4" style="border-radius: 16px 16px 0 0;">
                        <h5 class="mb-0 fw-bold"><i class="fa fa-plus-circle me-2"></i> Add Payment</h5>
                    </div>

                    <div class="card-body p-4">
                        <form id="paymentForm">
                            <div class="row g-4">
                                <div class="col-md-6 border-start border-3 border-primary ps-3">
                                    <label class="form-label text-muted fw-bold small text-uppercase">Student Name</label>
                                    <input type="text" id="p_student" class="form-control form-control-lg bg-light border-0" placeholder="Enter Student Name" required>
                                </div>

                                <div class="col-md-6 border-start border-3 border-primary ps-3">
                                    <label class="form-label text-muted fw-bold small text-uppercase">Room Number</label>
                                    <input type="text" id="p_room" class="form-control form-control-lg bg-light border-0" placeholder="Enter Room Number" required>
                                </div>

                                <div class="col-md-6 border-start border-3 border-primary ps-3">
                                    <label class="form-label text-muted fw-bold small text-uppercase">Amount (₹)</label>
                                    <input type="number" id="p_amount" class="form-control form-control-lg bg-light border-0" placeholder="Enter Amount" required>
                                </div>

                                <div class="col-md-6 border-start border-3 border-primary ps-3">
                                    <label class="form-label text-muted fw-bold small text-uppercase">Payment Method</label>
                                    <select id="p_method" class="form-select form-select-lg bg-light border-0">
                                        <option>Cash</option>
                                        <option>UPI</option>
                                        <option>Card</option>
                                        <option>Net Banking</option>
                                    </select>
                                </div>

                                <div class="col-md-6 border-start border-3 border-primary ps-3">
                                    <label class="form-label text-muted fw-bold small text-uppercase">Payment Date</label>
                                    <input type="date" id="p_date" class="form-control form-control-lg bg-light border-0" required>
                                </div>

                                <div class="col-md-6 border-start border-3 border-primary ps-3">
                                    <label class="form-label text-muted fw-bold small text-uppercase">Receipt Number</label>
                                    <input type="text" id="p_receipt" class="form-control form-control-lg bg-light border-0" placeholder="Enter Receipt Number">
                                </div>
                            </div>

                            <hr class="my-4 text-muted">

                            <div class="text-end">
                                <button type="reset" class="btn btn-light px-4 py-2 me-2">Cancel</button>
                                <button type="submit" class="btn btn-primary px-5 py-2" style="background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); border: none; font-weight: 600;">
                                    <i class="fa fa-save me-2"></i> Save Payment
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Payment Table -->
                <div class="card shadow animate__animated animate__fadeInUp border-0" style="animation-delay: 0.1s; border-radius: 16px; overflow: hidden;">
                    <div class="card-header bg-dark text-white py-3 px-4 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-bold"><i class="fa fa-history me-2"></i> Payment History</h5>
                        <div class="input-group" style="width: 250px;">
                            <span class="input-group-text bg-white border-0"><i class="fa fa-search text-muted"></i></span>
                            <input type="text" id="searchPayments" onkeyup="searchTable('searchPayments', 'paymentsTable')" class="form-control border-0 ps-0" placeholder="Search Payments..." style="box-shadow: none;">
                        </div>
                    </div>

                    <div class="card-body p-0">
                        <table class="table table-hover mb-0" id="paymentsTable">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4 py-3">Payment ID</th>
                                    <th class="py-3">Student Name</th>
                                    <th class="py-3">Room</th>
                                    <th class="py-3">Amount</th>
                                    <th class="py-3">Method</th>
                                    <th class="py-3">Date</th>
                                    <th class="pe-4 py-3">Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Dynamic Data Rendered via storage.js -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        function loadPayments() {
            let table = document.querySelector("#paymentsTable tbody");
            table.innerHTML = "";
            
            if(payments.length === 0) {
                table.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">No payments found.</td></tr>`;
                return;
            }

            payments.forEach(payment => {
                let badgeClass = "bg-secondary";
                if(payment.method === "Cash") badgeClass = "bg-primary";
                if(payment.method === "Card") badgeClass = "bg-info text-dark";

                let row = `
                <tr>
                    <td class="ps-4">${payment.id}</td>
                    <td class="fw-medium text-dark">${payment.student}</td>
                    <td>${payment.room}</td>
                    <td class="fw-bold">₹${payment.amount}</td>
                    <td><span class="badge ${badgeClass}">${payment.method}</span></td>
                    <td>${payment.date}</td>
                    <td class="pe-4"><span class="badge bg-success bg-opacity-10 text-success border border-success">${payment.status}</span></td>
                </tr>
                `;
                table.innerHTML += row;
            });
        }

        document.getElementById("paymentForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            let student = document.getElementById("p_student").value;
            let room = document.getElementById("p_room").value;
            let amount = document.getElementById("p_amount").value;
            let method = document.getElementById("p_method").value;
            let date = document.getElementById("p_date").value;
            let receipt = document.getElementById("p_receipt").value;
            
            await addPayment(student, room, amount, method, receipt, date);

            Swal.fire({
                icon: 'success',
                title: 'Payment Saved!',
                text: 'The payment has been successfully added.',
                confirmButtonColor: '#3a7bd5'
            });

            document.getElementById("paymentForm").reset();
            loadPayments();
        });

        window.onload = async function() {
            await initData();
            loadPayments();
            
            // Set date input default to today
            let today = new Date().toISOString().split('T')[0];
            document.getElementById("p_date").value = today;
        }
    </script>
    <script src="../js/bootstrap.bundle.js"></script>

    <!-- Shared Admin Layout -->
    <script src="../js/admin_layout.js"></script>
    <script>initAdminLayout('payments');</script>
</body>
</html>
