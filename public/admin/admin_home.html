<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Authentication -->
    <script src="../js/auth_service.js"></script>
    <script>AuthService.init('admin');</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Dashboard</title>
    <link rel="icon" href="../img/logo/logo.png">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="../css/animate.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- JS -->
    <script src="../js/sweetalert.js"></script>
    <script src="../js/constants.js"></script>
    <script src="../js/storage.js"></script>


</head>

<body class="bg-light">
    <div id="navbar-mount"></div>

    <!-- Navbar -->
    

    <div class="container-fluid" style="margin-top:70px">

        <div class="row">

            <!-- Sidebar -->
            
            <div id="sidebar-mount" class="col-md-2 p-0"></div>


            <!-- Main Dashboard -->
            <div class="col-md-10 p-4">

                <h2 class="mb-4">Dashboard</h2>

                <div class="row">

                    <!-- Students -->
                    <div class="col-md-3">
                        <div class="card text-white bg-primary shadow">
                            <div class="card-body text-center">
                                <h3><span id="dash_students">0</span></h3>
                                <p>Total Students</p>
                            </div>
                        </div>
                    </div>

                    <!-- Rooms -->
                    <div class="col-md-3">
                        <div class="card text-white bg-success shadow">
                            <div class="card-body text-center">
                                <h3><span id="dash_rooms">0</span></h3>
                                <p>Total Rooms</p>
                            </div>
                        </div>
                    </div>

                    <!-- Complaints -->
                    <div class="col-md-3">
                        <div class="card text-white bg-warning shadow">
                            <div class="card-body text-center">
                                <h3><span id="dash_complaints">0</span></h3>
                                <p>Complaints</p>
                            </div>
                        </div>
                    </div>

                    <!-- Payments -->
                    <div class="col-md-3">
                        <div class="card text-white bg-danger shadow">
                            <div class="card-body text-center">
                                <h3>&#8377;<span id="dash_fees">0</span></h3>
                                <p>Total Fees</p>
                            </div>
                        </div>
                    </div>

                </div>


                <!-- Charts Row -->
                <div class="row mt-5 mb-4">
                    <div class="col-md-4">
                        <div class="card shadow border-0 h-100" style="border-radius: 16px;">
                            <div class="card-header bg-white border-0 pt-4 pb-0">
                                <h6 class="fw-bold text-muted"><i class="fa fa-chart-pie me-2"></i>Room Occupancy</h6>
                            </div>
                            <div class="card-body">
                                <canvas id="roomChart" height="200"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card shadow border-0 h-100" style="border-radius: 16px;">
                            <div class="card-header bg-white border-0 pt-4 pb-0">
                                <h6 class="fw-bold text-muted"><i class="fa fa-chart-line me-2"></i>Payments Collected
                                </h6>
                            </div>
                            <div class="card-body">
                                <canvas id="paymentChart" height="200"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card shadow border-0 h-100" style="border-radius: 16px;">
                            <div class="card-header bg-white border-0 pt-4 pb-0">
                                <h6 class="fw-bold text-muted"><i class="fa fa-chart-bar me-2"></i>Complaint Categories
                                </h6>
                            </div>
                            <div class="card-body">
                                <canvas id="complaintChart" height="200"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Table -->
                <div class="card shadow border-0" style="border-radius: 16px; overflow:hidden;">

                    <div class="card-header bg-dark text-white">
                        Recent Students
                    </div>

                    <div class="card-body">

                        <table class="table table-bordered table-hover">

                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Room</th>
                                    <th>Course</th>
                                    <th>Status</th>
                                </tr>
                            </thead>

                            <tbody id="recentStudentsTable">
                                <!-- Dynamic JS Population -->
                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/index.js"></script>
    <script>
        window.onload = async function () {
            await initData();

            // Count students from applications: Allocated + Awaiting Payment + Pending Review
            let allocatedCount = 0;
            let pendingCount = 0;
            let awaitingCount = 0;
            let rejectedCount = 0;
            try {
                const res = await fetch(`${API_URL}/data/applications`, { credentials: 'include' });
                const apps = await res.json();
                allocatedCount = apps.filter(a => a.status === 'Allocated').length;
                pendingCount = apps.filter(a => a.status === 'Pending Review').length;
                awaitingCount = apps.filter(a => a.status === 'Approved - Awaiting Payment').length;
                rejectedCount = apps.filter(a => a.status === 'Rejected').length;
            } catch(e) { console.warn('Could not load applications:', e); }

            // Total students = all non-rejected applications (anyone engaged with the system)
            let totalStudents = allocatedCount + pendingCount + awaitingCount;
            document.getElementById("dash_students").textContent = totalStudents;
            document.getElementById("dash_rooms").textContent = rooms.length;
            document.getElementById("dash_complaints").textContent = complaints.length;

            
            try {
                const res = await fetch(`${API_URL}/finance/summary`, { credentials: 'include' });
                const fin = await res.json();
                document.getElementById("dash_fees").textContent = Math.round(fin.netProfit || 0).toLocaleString('en-IN');
                if (fin.moveOutRequests && fin.moveOutRequests.length > 0) {
                    const alertEl = document.getElementById("dash_refund_alert");
                    alertEl.textContent = `${fin.moveOutRequests.length} Refund Request${fin.moveOutRequests.length > 1 ? 's' : ''}`;
                    alertEl.style.display = "inline-block";
                }
            } catch(e) { console.warn('Could not load net revenue:', e); }

            let table = document.getElementById("recentStudentsTable");
            table.innerHTML = "";
            let recent = [...students].reverse().slice(0, 5);
            if (recent.length === 0) {
                table.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">No recent students found.</td></tr>`;
            } else {
                recent.forEach(student => {
                    let statusClass = student.status === "Active" ? "bg-success text-success border-success" : "bg-warning text-warning border-warning";
                    const isLeaving = applications.some(a => a.student === student.name && a.status === "Refund Pending");
                    if (isLeaving) statusClass = "bg-danger text-danger border-danger";
                    
                    table.innerHTML += `
                    <tr>
                        <td>${student.id}</td>
                        <td class="fw-medium">${student.name}</td>
                        <td>${student.room}</td>
                        <td><span class="badge bg-secondary">${student.course}</span></td>
                        <td>
                            ${isLeaving ? '<span class="badge bg-danger bg-opacity-10 border border-danger me-1">Leaving Soon</span>' : ''}
                            <span class="badge bg-opacity-10 border ${statusClass}">${student.status || 'Active'}</span>
                        </td>
                    </tr>`;
                });
            }
            if (typeof renderCharts === 'function') renderCharts();
        }
    </script>
    <script src="../js/bootstrap.bundle.js"></script>

    <!-- Shared Admin Layout -->
    <script src="../js/admin_layout.js"></script>
    <script>initAdminLayout('dashboard');</script>
</body>

</html>
