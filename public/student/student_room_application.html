<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Authentication -->
    <script src="../js/auth_service.js"></script>
    <script>
        let roomObj = null;
        let roomIdParam = null;
        let totalParam = 0;
        let facilitiesParam = "";
        let existingCollisionAppId = null;

        function updateCalculations() {
            const term = parseInt(document.getElementById("appTerm")?.value || 1);
            const rent = parseFloat(totalParam) || 0;
            const total = term * rent;

            const calcTotalEl = document.getElementById("calcTotal");
            if (calcTotalEl) calcTotalEl.textContent = total.toLocaleString();

            const end = new Date();
            end.setMonth(end.getMonth() + term);
            const calcEndDateEl = document.getElementById("calcEndDate");
            if (calcEndDateEl) calcEndDateEl.textContent = end.toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
        }
        AuthService.init('student');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Application (VIVA VERSION)</title>
    <link rel="icon" href="../img/logo/logo.png">
    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/animate.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="../js/sweetalert.js"></script>
    <script src="../js/constants.js?v=999"></script>
    <script src="../js/storage.js?v=999"></script>
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-md navbar-dark bg-dark shadow-lg fixed-top">
        <div class="container-fluid">
            <img src="../img/logo/logo.png" class="rounded-circle" width="45">
            <a class="navbar-brand mx-3 fw-bold">Student Portal</a>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="profileDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <span id="welcomeUser" class="text-white">Student</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid" style="margin-top:80px">
        <div class="row">
            <div class="col-md-2 bg-dark text-white p-3" style="min-height:100vh">
                <ul class="nav flex-column">
                    <li class="nav-item mb-2"><a href="student_dashboard.html" class="nav-link text-white"><i class="fa fa-home me-2"></i> Dashboard</a></li>
                    <li class="nav-item mb-2"><a href="student_room_details.html" class="nav-link text-white fw-bold active"><i class="fa fa-building me-2"></i> Rooms</a></li>
                </ul>
            </div>

            <div class="col-md-10 p-4">
                <h2 class="mb-4">Room Application Form</h2>

                <div class="card shadow border-0 rounded-4">
                    <div class="card-body p-5">
                        <form id="applicationForm">
                            <div class="row g-4">
                                <div class="col-md-4">
                                    <label class="form-label fw-bold small">First Name</label>
                                    <input type="text" id="appFirstName" class="form-control" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold small">Last Name</label>
                                    <input type="text" id="appLastName" class="form-control" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold small">Phone</label>
                                    <input type="tel" id="appPhone" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small">Course</label>
                                    <input type="text" id="appCourse" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small">Guardian</label>
                                    <input type="text" id="appGuardian" class="form-control" required>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-bold small">Stay Duration</label>
                                    <select id="appTerm" class="form-select" onchange="updateCalculations()">
                                        <option value="1">1 Month</option>
                                        <option value="6">6 Months</option>
                                        <option value="11">11 Months</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold small">ID Proof (Optional for Demo)</label>
                                    <input type="file" id="appIdProof" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small">Photo (Optional for Demo)</label>
                                    <input type="file" id="appPhoto" class="form-control">
                                </div>

                                <div class="col-md-12 text-end mt-4">
                                    <button type="submit" id="submitBtn" class="btn btn-primary btn-lg px-5 py-3 rounded-pill fw-bold shadow">
                                        Submit Application
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUserId = localStorage.getItem("loggedUser") || "Student";
        window.onload = async function() {
            await initData();
            document.getElementById("welcomeUser").textContent = "Hi, " + currentUserId;
            const params = new URLSearchParams(window.location.search);
            roomIdParam = params.get('roomId');
            totalParam = params.get('total') || 0;
            roomObj = rooms.find(r => r.id == roomIdParam);
            updateCalculations();

            const s = (typeof students !== 'undefined' ? students : []).find(x => x.name.toLowerCase() === currentUserId.toLowerCase());
            if (s) {
                document.getElementById("appFirstName").value = s.name.split(' ')[0] || "";
                document.getElementById("appLastName").value = s.name.split(' ')[1] || "";
                document.getElementById("appPhone").value = s.phone || "";
                document.getElementById("appCourse").value = s.course || "";
                document.getElementById("appGuardian").value = s.guardianName || "";
            }
        };

        // NEW: Fast Base64 (NO Compression to avoid hangs during VIVA)
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve({ name: file.name, data: reader.result });
                reader.onerror = error => reject(error);
            });
        }

        document.getElementById("applicationForm").onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById("submitBtn");
            btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> Submitting...`;
            btn.disabled = true;

            try {
                const idFile = document.getElementById("appIdProof").files[0];
                const photoFile = document.getElementById("appPhoto").files[0];
                
                let idData = null;
                let photoData = null;

                if (idFile) idData = await getBase64(idFile);
                if (photoFile) photoData = await getBase64(photoFile);

                const payload = {
                    student: currentUserId,
                    studentName: document.getElementById("appFirstName").value + " " + document.getElementById("appLastName").value,
                    course: document.getElementById("appCourse").value,
                    phone: document.getElementById("appPhone").value,
                    guardian: document.getElementById("appGuardian").value,
                    roomId: roomIdParam,
                    roomNumber: roomObj ? roomObj.number : "Unknown",
                    termMonths: parseInt(document.getElementById("appTerm").value),
                    totalAmount: parseInt(document.getElementById("appTerm").value) * parseFloat(totalParam),
                    status: "Pending Review",
                    date: new Date().toLocaleDateString(),
                    idProof: idData,
                    photo: photoData
                };

                const res = await fetch(`${API_URL}/data/applications`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                if (data.success) {
                    Swal.fire('Success!', 'Application submitted!', 'success').then(() => {
                        window.location.href = 'student_application_status.html';
                    });
                } else {
                    throw new Error(data.message);
                }
            } catch (err) {
                console.error(err);
                Swal.fire('Error', 'Submission failed: ' + err.message, 'error');
                btn.innerHTML = 'Submit Application';
                btn.disabled = false;
            }
        };
    </script>
    <script src="../js/bootstrap.bundle.js"></script>
</body>
</html>
