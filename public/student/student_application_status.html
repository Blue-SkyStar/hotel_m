/* RESTORING FILE FROM KNOWN STABLE STATE */
<!DOCTYPE html>
<html lang="en">
<head>
    <script src="../js/auth_service.js"></script>
    <script>AuthService.init('student');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Applications</title>
    <!-- Bootstrap 5 CSS -->
    <link href="../css/bootstrap.css" rel="stylesheet">
    <link href="../css/index.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .application-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .application-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .status-badge {
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 50px;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body class="bg-dark text-white">
    <div id="sidebar-placeholder"></div>

    <div class="main-content p-4">
        <div class="container-fluid">
            <!-- Header section -->
            <div class="d-flex justify-content-between align-items-center mb-5">
                <div class="d-flex align-items-center gap-3">
                    <div class="bg-primary bg-opacity-25 p-3 rounded-4">
                        <i class="fas fa-file-signature text-primary fa-2x"></i>
                    </div>
                    <h1 class="h2 mb-0 fw-bold">My Applications</h1>
                </div>
                <div class="d-flex gap-3">
                    <button id="refreshBtn" class="btn btn-outline-light rounded-pill px-4">
                        <i class="fas fa-sync-alt me-2"></i> Refresh
                    </button>
                    <a href="student_room_details.html" class="btn btn-primary rounded-pill px-4 shadow">
                        <i class="fas fa-plus me-2"></i> New Application
                    </a>
                </div>
            </div>

            <!-- Content Area -->
            <div id="applicationsContainer">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary shadow" role="status" style="width: 3rem; height: 3rem;"></div>
                    <p class="mt-3 text-secondary">Loading your applications...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/constants.js"></script>
    <script src="../js/storage.js"></script>
    <script>
        let currentUserId = localStorage.getItem("loggedUser") || "Student";
        let applications = [];

        window.onload = async function() {
            // Wait for sidebar
            await fetch("student_sidebar.html").then(res => res.text()).then(html => {
                document.getElementById("sidebar-placeholder").innerHTML = html;
                const scripts = document.getElementById("sidebar-placeholder").getElementsByTagName('script');
                for (let script of scripts) { eval(script.innerText); }
            });

            await initData();
            await loadApplications();

            document.getElementById("refreshBtn").addEventListener("click", () => {
                const container = document.getElementById("applicationsContainer");
                container.innerHTML = `
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
                        <p class="mt-3 text-secondary">Refreshing data...</p>
                    </div>
                `;
                loadApplications();
            });
        };

        async function initData() {
            try {
                const data = await fetchWithCache();
                if (data) {
                    window.rooms = data.rooms;
                    window.students = data.students;
                }
            } catch (e) { console.error("Init Data Failed", e); }
        }

        async function loadApplications() {
            try {
                console.log("Fetching applications for:", currentUserId);
                const res = await fetch(`${API_URL}/data/applications`, { credentials: 'include' });
                const allApps = await res.json();

                if (!Array.isArray(allApps)) {
                    throw new Error('Please login again to view your applications.');
                }

                // Filter by current student
                applications = allApps.filter(app => app.student === currentUserId);
                console.log("Loaded applications:", applications.length);

                renderApplications();
            } catch (e) {
                console.error("Load Error:", e);
                document.getElementById('applicationsContainer').innerHTML = `
                    <div class="alert alert-danger border-0 rounded-4 text-center p-5 shadow-lg" style="background: rgba(220, 53, 69, 0.1);">
                        <i class="fas fa-exclamation-triangle fa-3x mb-3 text-danger"></i>
                        <h4 class="fw-bold">Unable to Load Applications</h4>
                        <p class="text-secondary mb-4">${e.message}</p>
                        <a href="../login.html" class="btn btn-danger rounded-pill px-5">Go to Login</a>
                    </div>
                `;
            }
        }

        function renderApplications() {
            const container = document.getElementById("applicationsContainer");

            if (applications.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5 text-secondary">
                        <i class="fas fa-folder-open fa-4x mb-4 opacity-25"></i>
                        <h3 class="fw-light">No applications found.</h3>
                        <p>Would you like to <a href="student_room_details.html" class="text-primary text-decoration-none fw-bold">apply for a room</a>?</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `<div class="row g-4" id="appsRow"></div>`;
            const row = document.getElementById("appsRow");

            applications.forEach(app => {
                const statusColor = getStatusColor(app.status || "Pending Review");
                const card = `
                    <div class="col-md-6 col-xl-4">
                        <div class="application-card h-100 p-4">
                            <div class="d-flex justify-content-between align-items-start mb-4">
                                <span class="status-badge" style="background: ${statusColor}22; color: ${statusColor}; outline: 1px solid ${statusColor}44">
                                    ${app.status || "Pending Review"}
                                </span>
                                <small class="text-secondary"><i class="far fa-calendar-alt me-2"></i> ${app.date}</small>
                            </div>
                            
                            <h4 class="fw-bold mb-3">${app.roomType} Room</h4>
                            
                            <div class="d-flex flex-column gap-2 mb-4">
                                <div class="d-flex align-items-center gap-2 text-secondary">
                                    <i class="fas fa-door-closed w-25px"></i>
                                    <span>Room #${app.roomNumber}</span>
                                </div>
                                <div class="d-flex align-items-center gap-2 text-secondary">
                                    <i class="fas fa-hourglass-half w-25px"></i>
                                    <span>${app.termMonths} Months Stay</span>
                                </div>
                                <div class="d-flex align-items-center gap-2 text-secondary">
                                    <i class="fas fa-rupee-sign w-25px"></i>
                                    <span>Monthly: ₹${app.monthlyRent.toLocaleString()}</span>
                                </div>
                            </div>

                            <hr class="border-secondary opacity-10 my-4">

                            <div class="d-flex justify-content-between align-items-center">
                                <div class="text-secondary small">Total Due</div>
                                <div class="h4 mb-0 fw-bold text-white">₹${app.totalAmount.toLocaleString()}</div>
                            </div>
                        </div>
                    </div>
                `;
                row.innerHTML += card;
            });
        }

        function getStatusColor(status) {
            switch (status.toLowerCase()) {
                case 'approved': return '#20c997';
                case 'rejected': return '#ff4b5c';
                case 'waitlisted': return '#ffca2c';
                case 'paid': return '#0dcaf0';
                default: return '#6c757d';
            }
        }
    </script>
    <script src="../js/bootstrap.bundle.js"></script>
    <script src="../js/student_notifications.js"></script>
</body>
</html>
